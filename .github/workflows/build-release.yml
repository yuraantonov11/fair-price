name: Legacy Build (Manual Only)
# Legacy manual artifact build. Canonical tagged publishing is handled by .github/workflows/release.yml.

on:
  workflow_dispatch:

concurrency:
  group: legacy-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run ci:check

      - name: Build extensions
        run: npm run ci:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legacy-built-extensions
          path: .output/**/*
          retention-days: 7
